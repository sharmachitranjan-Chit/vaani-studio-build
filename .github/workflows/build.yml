on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open project ZIP
        run: |
          test -f Vaani-Studio-Android-Project.zip
          mkdir -p work
          unzip -q Vaani-Studio-Android-Project.zip -d work

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: |
          cd work
          gradle assembleRelease --no-daemon

      - name: Prepare APK
        run: cp work/app/build/outputs/apk/release/app-release.apk VaaniStudio-3.0.0.apk

      - uses: actions/upload-artifact@v4
        with:
          name: VaaniStudio-APK
          path: VaaniStudio-3.0.0.apk
